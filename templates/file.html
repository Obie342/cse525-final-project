{% extends "base.html" %}
{% block title %}File Visualization{% endblock %}
{% block content %}
<h1>WAV visualization started</h1>
<p>Now visualizing <strong>{{ filename }}</strong>.</p>
<form action="{{ url_for('web.stop') }}" method="post"><button type="submit">Stop visualization</button></form>
<a class="button secondary" href="{{ url_for('web.index') }}">Back to dashboard</a>
{% endblock %}
